<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
  </head>
  <body>
    <h1>Checkout</h1>
    <section>
      <h2>Your Cart</h2>
      <img
        src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg"
        alt="partially solved Rubik's cube"
      />
      <p>
        Rubik's Cube $19.99
      </p>
    </section>
    <section>
      <h2>Payment Information</h2>
      <form>
       <label for="card-name"> Cardholder Name</label>
       <input type="text" id="card-name" name="card-name"></input>
       <br>
       <label for="card number">Cardholder number</label>
       <input type="number" id="card-number" name="card-number" aria-describedby="card-number-help"></input>
      <p id="card-number-help">Please enter your 16-digit card number without spaces or dashes</p>
      <br>
      <label for="exp-date">Exp Date<span aria-hidden="true">*</span></label>
      <input type="date" id="exp-date" name="exp-date" required></input>
      <br>
      <label for="ccv">CCV<span aria-hidden="true">*</span></label>
      <input type="number" id="ccv" name="ccv" required></input>
      <br>
      <button type="button">Place Order</button>
      </form>
    </section>
  </body>
</html>
