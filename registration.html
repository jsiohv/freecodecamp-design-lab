<!DOCTYPE html>
<html lang="EN">
 <head>
<meta charset="UTF-8">
<title>Regisrtation Form</title>
<link rel="stylesheet" href="./css/regrisrtation.css">
 </head>
 <body>
  <h1>Registration Form</h1>
  <p>Please fill out this form with the required information
</p>
<form action="https://register-demo.freecodecamp.org" method="post">
 <fieldset>
  <label for="first-name">Enter Your First Name: <input id="first-name" type="text" name="fname" required></label>
  <label for="last-name">Enter Your Last Name: <input id="last-name" type="text" name="lname" required></label>
  <label for="email">Enter Your Email: <input id="email" type="email" name="email" required></label>
  <label for="new-password">Create a New Password: <input id="new-password" type="password" pattern="[a-z0-5]{8,}" name="password" required></label>
 </fieldset>
 <fieldset>
  <legend> Account type (required)</legend>
  <label for-="personal-account"><input type="radio" name="account-type" value="personal" checked id="personal-account" class="inline"> Personal</label>
  <label for="business-account"><input type="radio"name="account-type" value="business" id="business-account" class="inline"> Business</label>
 </fieldset>
 <fieldset>
  <label for="profile-picture">Upload a profile picture:<input type="file" id="profile-picture" name="picture"></label>
  <label for="age">Input your age(years):<input type="number" min="13" max="120" id="age" name="age"></label>
<label for="referrer">How did you hear about us?
  <select id="referrer" name="refer">
   <option value="">(select one)</option>
   <option value="1">freeCodecamp News</option>
   <option value="2">freeCodecamp YouTube Channel</option>
   <option value="3">freeCodeCamp Forum</option>
   <option value="4">Other</option>
  </select>
  </label>
  <label for="bio">Provide a bio:<textarea id="bio" rows="3" cols="30" placeholder="I like coding on the beach" name="bio"></textarea></label>
 </fieldset>
 <a href="https://www.freecodecamp.org/news/terms-of-service/">Read our terms and conditions</a>
 <label for="terms-conditions"><input type="checkbox" class="inline" id="terms-condtions" name="terms" required> I accept the terms and conditions</label>
<input type="submit" value="submit">
</form>
 </body>
</html>
