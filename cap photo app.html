<!DOCTYPE >
<html lang="En">
  <head>
    <meta charset="UTF-8" />
    <title>CatPhotoApp</title>
  </head>
  <body>
    <main>
      <h1>CatPhotoApp</h1>
      <section>
        <h2>Cat photos</h2>

        <p>
          Everyone loves<a
            href="https://cdn.freecodecamp.org/curriculum/cat-photo-app/running-cats.jpg"
          >
            cute cats</a
          >
          online!
        </p>
        <p>
          See more
          <a target="_blank" href="https://freecatphotoapp.com">cat photos</a>
          in our gallery.
        </p>
        <a
          href="https://cdn.freecodecamp.org/curriculum/cat-photo-app/running-cats.jpg"
        >
          <img
            src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/relaxing-cat.jpg"
            alt="a cute orange cat lying on it's back"
        /></a>
      </section>
      <section>
        <h2>Cat Lists</h2>
        <h3>Things cats love:</h3>
        <ul>
          <li>catnip</li>
          <li>laser pointers</li>
          <li>Lasagna</li>
        </ul>
        <figure>
          <img
            src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/lasagna.jpg"
            alt="a slice of lasgana on a plate"
          />
          <figcaption>Cats <em>love</em> lasagana</figcaption>
        </figure>
        <h3>Top three things cats hate:</h3>
        <ol>
          <li>flea treatment</li>
          <li>thunder</li>
          <li>other cats</li>
        </ol>
        <figure>
          <img
            src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/cats.jpg"
            alt="two tabby kittens sleeping together on a couch."
          />
          <figcaption>Cats <strong>hate</strong> other cats</figcaption>
        </figure>
      </section>
    </main>
    <footer>
      <p>
        No copyright -
        <a href="https://www.freecodecamp.org">freeCodeCamp.org</a>
      </p>
    </footer>
  </body>
</html>
